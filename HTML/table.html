<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table-Tag</title>
    <style>
        table,th,td{
            border: 0.5px solid black;
            background-color: rgb(202, 240, 240);
        }
        
    </style>
</head>
<body>
    <table style="width:100;">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Abdullah</td>
            <td>babu</td>
            <td>90</td>

        </tr>
        <tr>
            <td>Putin</td>
            <td>vlodmir</td>
            <td>78</td>
        </tr>
        <tr>
            <td>Chtis</td>
            <td>pratt</td>
            <td>46</td>
        </tr>
    </table>
</body>
</html>
